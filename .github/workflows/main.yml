name: GitHub Pages and Release PDF

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r ./requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate HTML using Sphinx
        run: |
          make html

      - name: Generate LaTeX using Sphinx
        run: |
          make latex

      - name: Generate EPUB using Sphinx
        run: |
          make epub

      - name: Build PDF via TeXLive
        uses: xu-cheng/texlive-action/full@v1
        with:
          run: |
            apk add make
            tlmgr install gnu-freefont
            make -C build/latex

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build/html

      - name: Publish PDF and EPUB to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/latex/introcs-python.pdf
            build/epub/introcs-python.epub

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
